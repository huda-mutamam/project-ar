<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>project_kapal_kajang</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.x/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.75;" vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true; antialias: true;">
    <a-assets>
      <audio id="musik-bg" src="sriwijaya.mpeg" preload="auto"></audio>
    </a-assets>

    <a-marker preset="hiro" id="marker-utama" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
      <a-entity
        gltf-model="project_kapal_kajangfix.glb"
        scale="0.2 0.2 0.2"
        position="0 0.1 0"
        rotation="-90 0 0"
        animation-mixer="clip: *; loop: repeat">
      </a-entity>

      <!-- Teks label -->
      <a-text
        value="Kapal Kajang Musi"
        align="center"
        position="0 0.4 0.1"
        scale="0.4 0.4 0.4"
        color="#FFFFFF"
        side="double"
        font="roboto">
      </a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.querySelector('#marker-utama');
    const musik = document.querySelector('#musik-bg');

    marker.addEventListener('markerFound', () => {
      musik.play().catch(() => {}); // catch biar gak error kalau browser blokir autoplay
    });

    marker.addEventListener('markerLost', () => {
      musik.pause();
    });
  </script>

</body>
</html>
