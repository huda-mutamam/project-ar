<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>project_kapal_kajang</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
    <a-assets>
      <audio id="musik-bg" src="sriwijaya.mpeg" preload="auto"></audio>
    </a-assets>

    <a-marker preset="hiro" id="marker-utama" smooth="true" smoothCount="15" smoothTolerance="0.01" smoothThreshold="5">
      <!-- Parent entity untuk rotasi sudut pandang -->
      <a-entity rotation="-75 0 0">
        <a-entity
          gltf-model="project_kapal_kajangfix.glb"
          scale="0.3 0.3 0.3"
          position="0 0 0"
          animation-mixer="clip: *; loop: repeat">
        </a-entity>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.querySelector('#marker-utama');
    const musik = document.querySelector('#musik-bg');

    marker.addEventListener('markerFound', () => {
      musik.play().catch(() => {}); // catch biar gak error kalau browser blokir autoplay
    });

    marker.addEventListener('markerLost', () => {
      musik.pause();
    });
  </script>

</body>
</html>
