<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>project_kapal_kajang</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.x/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: white;
      font-family: Arial, sans-serif;
    }
    #loading-screen .spinner {
      width: 50px; height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid #FFD700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-screen p { font-size: 16px; text-align: center; }
    #status-text { font-size: 12px; color: #aaa; margin-top: 10px; }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Memuat Model 3D Kapal Kajang...</p>
    <p id="status-text">Mohon tunggu, file cukup besar</p>
  </div>

  <a-scene embedded
    arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.75;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    loading-screen="enabled: false">

    <a-marker preset="hiro" id="marker-utama" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
      <a-entity
        id="model-kapal"
        gltf-model="./project_kapal_kajangfix.glb"
        scale="0.2 0.2 0.2"
        position="0 0.05 0"
        rotation="-70 0 0"
        animation-mixer="clip: *; loop: repeat">
      </a-entity>

      <!-- Teks Judul -->
      <a-text
        value="Kapal Kajang Musi"
        align="center"
        position="0 0.55 0.1"
        scale="0.5 0.5 0.5"
        color="#FFD700"
        side="double"
        font="roboto">
      </a-text>

      <!-- Teks Keterangan -->
      <a-text
        value="Kapal tradisional Sungai Musi\nyang digunakan untuk\ntransportasi dan perdagangan\ndi era Kesultanan Palembang"
        align="center"
        position="0 0.35 0.1"
        scale="0.25 0.25 0.25"
        color="#FFFFFF"
        side="double"
        font="roboto"
        baseline="top">
      </a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <!-- Audio terpisah dari a-assets agar tidak blocking -->
  <audio id="musik-bg" src="./sriwijaya.mpeg" preload="none"></audio>

  <script>
    const marker = document.querySelector('#marker-utama');
    const model = document.querySelector('#model-kapal');
    const musik = document.getElementById('musik-bg');
    const loadingScreen = document.getElementById('loading-screen');
    const statusText = document.getElementById('status-text');

    // Tunggu model selesai di-load
    model.addEventListener('model-loaded', () => {
      console.log('Model berhasil dimuat!');
      statusText.textContent = 'Model siap! Arahkan kamera ke marker Hiro.';
      setTimeout(() => {
        loadingScreen.style.display = 'none';
      }, 1500);
    });

    // Error handling jika model gagal load
    model.addEventListener('model-error', (e) => {
      console.error('Gagal memuat model:', e);
      statusText.textContent = 'Gagal memuat model. Coba refresh halaman.';
    });

    // Fallback: sembunyikan loading setelah 15 detik
    setTimeout(() => {
      if (loadingScreen.style.display !== 'none') {
        statusText.textContent = 'Arahkan kamera ke marker Hiro';
        loadingScreen.style.display = 'none';
      }
    }, 15000);

    // Musik saat marker ditemukan
    marker.addEventListener('markerFound', () => {
      musik.play().catch(() => {});
    });

    marker.addEventListener('markerLost', () => {
      musik.pause();
    });
  </script>

</body>
</html>
